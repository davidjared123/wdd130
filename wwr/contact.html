<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Exciting Expeditions Rafting</title>
    <meta name="description"
      content="Get in touch with Exciting Expeditions. We are here to answer your questions about our white water rafting trips.">
    <meta name="author" content="David Perez">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <div class="content-centered header-content">
            <img src="images/logo-rafting.jpeg" alt="Rafting Company Logo" class="logo">
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="trips.html">Trips</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="content-centered">
            <section class="contact-info">
                <h1>Contact Us</h1>
                <p><strong>Address:</strong> 123 Main River Street, Kolob, California</p>
                <p><strong>Phone:</strong> +1 999 999 9999</p>
                <p><strong>Email:</strong> info@whitewater.com</p>
            </section>

            <div class="contact-grid">
                <section class="map">
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.83543450937!2d-122.4194155!3d37.7749295!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085809c6c8f4459%3A0xb10ed6d9b5050fa5!2sSan%20Francisco%2C%20CA!5e0!3m2!1sen!2sus!4v1633000000000!5m2!1sen!2sus"
                      width="100%" height="450" style="border:0;" allowfullscreen=""
                      loading="lazy"></iframe>
                </section>

                <section class="form-section">
                    <form action="#">
                        <div class="form-item">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="user_name" placeholder="Full Name"
                              required>
                        </div>
                        <div class="form-item">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="user_email"
                              placeholder="email@example.com" required>
                        </div>

                        <div class="form-item">
                            <p>Message Purpose</p>
                            <label><input type="radio" name="purpose" value="general"> General
                                Inquiry</label>
                            <label><input type="radio" name="purpose" value="reservation">
                                Reservation Question</label>
                            <label><input type="radio" name="purpose" value="suggestion"> Website
                                Suggestion</label>
                        </div>

                        <div class="form-item">
                            <label for="message">Message</label>
                            <textarea id="message" name="user_message" rows="5"
                              placeholder="Type here..."></textarea>
                        </div>

                        <div class="form-item">
                            <label><input type="checkbox" name="newsletter"> Please Subscribe me to
                                the monthly newsletter</label>
                        </div>

                        <button type="submit">Get in Touch!</button>
                    </form>
                </section>
            </div>

            <section class="employee-section">
                <h2>We Are Here to Serve You</h2>
                <div class="employee-gallery">
                    <figure>
                        <img src="https://placehold.co/200x200?text=Manager" alt="Employee 1">
                        <figcaption>Employee Profile</figcaption>
                    </figure>
                    <figure>
                        <img src="https://placehold.co/200x200?text=Guide" alt="Employee 2">
                        <figcaption>Employee Profile</figcaption>
                    </figure>
                    <figure>
                        <img src="https://placehold.co/200x200?text=Safety" alt="Employee 3">
                        <figcaption>Employee Profile</figcaption>
                    </figure>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="content-centered footer-content">
            <p>&copy; 2026 White Water Rafting | Exciting Expeditions | David Perez</p>
            <nav class="socialmedia">
                <a href="https://facebook.com" target="_blank"><img
                      src="https://placehold.co/32x32/ffffff/000000?text=f" alt="Facebook"></a>
                <a href="https://linkedin.com" target="_blank"><img
                      src="https://placehold.co/32x32/ffffff/000000?text=in" alt="LinkedIn"></a>
                <a href="https://instagram.com" target="_blank"><img
                      src="https://placehold.co/32x32/ffffff/000000?text=ig" alt="Instagram"></a>
            </nav>
        </div>
    </footer>
</body>

</html>
