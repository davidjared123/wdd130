<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Exciting Expeditions Rafting</title>
    <meta name="description"
      content="Get in touch with Exciting Expeditions. We are here to answer your questions about our white water rafting trips.">
    <meta name="author" content="David Perez">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <div class="content-centered header-content">
            <img src="images/logo-rafting.jpeg" alt="Rafting Company Logo" class="logo">
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="trips.html">Trips</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="content-centered">
            <section class="contact-info">
                <h1>Contact Us - Exciting Expeditions</h1>
                <p><strong>Address:</strong> 123 Main River Street, Kolob, California</p>
                <p><strong>Phone:</strong> +1 999 999 9999</p>
                <p><strong>Email:</strong> info@whitewater.com</p>
            </section>

            <div class="contact-grid">
                <section class="map">
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15691.64444583155!2d-69.34963385!3d10.0654162!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses-419!2sve!4v1711980000000!5m2!1ses-419!2sve"
                      width="600" height="450" allowfullscreen="" loading="lazy"></iframe>
                </section>

                <section class="form-section">
                    <form action="#">
                        <div class="form-item">
                            <label for="user_name">Name</label>
                            <input type="text" id="user_name" name="user_name"
                              placeholder="Full Name" required>
                        </div>
                        <div class="form-item">
                            <label for="user_email">Email</label>
                            <input type="email" id="user_email" name="user_email"
                              placeholder="email@example.com" required>
                        </div>

                        <div class="form-item">
                            <p>Message Purpose</p>
                            <label for="general"><input type="radio" id="general" name="purpose"
                                  value="general"> General Inquiry</label>
                            <label for="reservation"><input type="radio" id="reservation"
                                  name="purpose" value="reservation"> Reservation Question</label>
                            <label for="suggestion"><input type="radio" id="suggestion"
                                  name="purpose" value="suggestion"> Website Suggestion</label>
                        </div>

                        <div class="form-item">
                            <label for="user_message">Message</label>
                            <textarea id="user_message" name="user_message" rows="5"
                              placeholder="Type here..."></textarea>
                        </div>

                        <div class="form-item">
                            <label for="subscribe"><input type="checkbox" id="subscribe"
                                  name="newsletter"> Please Subscribe me to the monthly
                                newsletter</label>
                        </div>

                        <button type="submit">Send Message Now</button>
                    </form>
                </section>
            </div>

            <section class="employee-section">
                <h2>We Are Here to Serve You</h2>
                <div class="employee-gallery">
                    <figure>
                        <img src="images/manager.png" alt="Our General Manager" width="200"
                          height="200">
                        <figcaption>General Manager Profile</figcaption>
                    </figure>
                    <figure>
                        <img src="images/guide.png" alt="Senior Rafting Guide" width="200"
                          height="200">
                        <figcaption>Rafting Guide Profile</figcaption>
                    </figure>
                    <figure>
                        <img src="images/safety.png" alt="Safety Specialist" width="200"
                          height="200">
                        <figcaption>Safety Officer Profile</figcaption>
                    </figure>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="content-centered footer-content">
            <p>© 2026 Exciting Expeditions | David Perez</p>
            <nav class="socialmedia">
                <a href="https://facebook.com" target="_blank"><img src="images/facebook.svg"
                      alt="Follow us on Facebook" width="32" height="32"></a>
                <a href="https://linkedin.com" target="_blank"><img src="images/linkedin.svg"
                      alt="Join us on LinkedIn" width="32" height="32"></a>
                <a href="https://instagram.com" target="_blank"><img src="images/instagram.svg"
                      alt="See our photos on Instagram" width="32" height="32"></a>
            </nav>
        </div>
    </footer>
</body>

</html>
