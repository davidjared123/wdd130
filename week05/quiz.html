<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario de HTML y CSS</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <header>
        <h1>Cuestionario Básico de HTML y CSS</h1>
    </header>
    <main>
        <form action="#">
            <div class="form-item">
                <label for="q1">1. ¿Qué significan las siglas CSS?</label>
                <input type="text" id="q1" name="q1" required>
            </div>

            <div class="form-item">
                <label for="q2">2. ¿Cómo se seleccionan los atributos id y class en CSS?</label>
                <textarea id="q2" name="q2" rows="4" required></textarea>
            </div>

            <div class="form-item">
                <label for="q3">3. ¿Cuál de los siguientes es un comentario válido en CSS?</label>
                <select id="q3" name="q3" required>
                    <option value="" selected disabled>Elija uno...</option>
                    <option value="opt1">/* comentario */</option>
                    <option value="opt2">// comentario</option>
                    <option value="opt3">&lt;!-- comentario --&gt;</option>
                </select>
            </div>

            <div class="form-item">
                <label for="q4">4. ¿Cuál es el margen inferior (bottom) en esta declaración? <br>
                    <code>margin: 10px 5px 15px;</code></label>
                <input type="number" id="q4" name="q4" required>
            </div>

            <button type="submit">Enviar Cuestionario</button>
        </form>
    </main>
</body>

</html>
